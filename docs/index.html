<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beautiful F1 — Dashboard 2026</title>
  <link rel="stylesheet" href="assets/dashboard.css" />
</head>
<body>
  <header class="dash-header">
    <h1>F1 2026 — Dashboard</h1>
    <p id="dash-subtitle" class="dash-subtitle">Chargement…</p>
  </header>

  <main class="dash-container">

    <!-- Bandeau KPI (4 tuiles, dont countdown) -->
    <section class="dash-section" aria-label="Indicateurs clés">
      <div id="dash-kpis" class="dash-grid dash-grid--kpi" role="list"></div>
    </section>

    <!-- Zone principale 2 colonnes : Classements + Visualisations -->
    <section class="dash-section dash-main-grid">
      <!-- Colonne 1 : Classements + Calendrier en onglets -->
      <div class="dash-card dash-card--standings">
        <div class="dash-card-header">
          <div class="dash-tabs" role="tablist" aria-label="Vue principale">
            <button class="dash-tab active" data-tab="drivers" role="tab" aria-selected="true">Pilotes</button>
            <button class="dash-tab" data-tab="constructors" role="tab" aria-selected="false">Constructeurs</button>
            <button class="dash-tab" data-tab="calendar" role="tab" aria-selected="false">Calendrier <span id="dash-calendar-progress" class="dash-tab-badge"></span></button>
            <button class="dash-tab" data-tab="duel" role="tab" aria-selected="false">Duel</button>
            <button class="dash-tab" data-tab="teammates" role="tab" aria-selected="false">Coéquipiers · Qualifs</button>
          </div>
        </div>
        <div id="standings-pane-drivers" class="dash-tab-pane active">
          <table id="standings-drivers" class="dash-table"></table>
        </div>
        <div id="standings-pane-constructors" class="dash-tab-pane">
          <table id="standings-constructors" class="dash-table"></table>
        </div>
        <div id="standings-pane-calendar" class="dash-tab-pane">
          <ol id="dash-calendar" class="dash-calendar"></ol>
        </div>
        <div id="standings-pane-duel" class="dash-tab-pane">
          <div class="dash-duel-pickers">
            <select id="duel-a" class="dash-duel-select" aria-label="Pilote A"></select>
            <span class="dash-duel-vs">VS</span>
            <select id="duel-b" class="dash-duel-select" aria-label="Pilote B"></select>
          </div>
          <div id="dash-duel-content" class="dash-duel-content"></div>
        </div>
        <div id="standings-pane-teammates" class="dash-tab-pane">
          <div class="dash-teammates-controls">
            <label class="dash-teammates-label">
              Écurie
              <select id="dash-teammates-team" class="dash-duel-select"></select>
            </label>
            <div class="dash-teammates-filters" role="tablist" aria-label="Type de session">
              <button class="dash-pill active" data-session="ALL" role="tab" aria-selected="true">Tous</button>
              <button class="dash-pill" data-session="Q" role="tab" aria-selected="false">Qualifs</button>
              <button class="dash-pill" data-session="SQ" role="tab" aria-selected="false">Sprint Qualifs</button>
            </div>
          </div>
          <div id="dash-teammates-content"></div>
        </div>

        <!-- Hôte d'affichage d'une viz embarquée (activé depuis la carte Visualisations) -->
        <div id="dash-embed-host" class="dash-embed-host" hidden>
          <div class="dash-embed-bar">
            <button id="dash-embed-back" type="button" class="dash-embed-back">← Retour</button>
            <span id="dash-embed-title" class="dash-embed-title"></span>
            <a id="dash-embed-open" class="dash-embed-open" href="#" target="_blank" rel="noopener">Ouvrir en pleine page ↗</a>
          </div>
          <iframe id="dash-embed-frame" class="dash-embed-frame" title="Visualisation"></iframe>
        </div>
      </div>

      <!-- Colonne 2 : Visualisations -->
      <div class="dash-card dash-card--shortcuts">
        <div class="dash-card-header">
          <h3 class="dash-card-title">Visualisations</h3>
        </div>
        <div id="dash-viz" class="dash-shortcuts"></div>
      </div>
    </section>

  </main>

  <footer class="dash-footer">
    <small>Beautiful F1 — Dashboard saison 2026 • Données : FastF1 • <a href="https://github.com/hericlibong/beautifullF1">GitHub</a></small>
  </footer>

  <script src="assets/navbar.js" data-base="./" defer></script>
  <script src="assets/dashboard.js" defer></script>
</body>
</html>
