name: Refresh data after GP

# Déclenchement :
#   - Cron lundi 14h UTC (race F1 = dimanche, FastF1 a propagé les résultats)
#   - Cron mardi 14h UTC (filet de sécurité si FastF1 avait du retard lundi)
#   - workflow_dispatch (bouton "Run workflow" dans l'onglet Actions)
"on":
  schedule:
    - cron: "0 14 * * 1"
    - cron: "0 14 * * 2"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Décide s'il y a eu un GP dans les 2 derniers jours. Sinon, on saute proprement.
      - name: Check if a GP occurred recently
        id: check
        run: python projects/dashboard/check_should_refresh.py

      - name: Skip notice
        if: steps.check.outputs.should-refresh != 'true' && github.event_name != 'workflow_dispatch'
        run: |
          echo "Pas de GP récent — pipeline non lancé."
          echo "Raison : ${{ steps.check.outputs.reason }}"

      # Cache du dossier FastF1 (sessions déjà téléchargées) pour accélérer les runs suivants
      - name: Cache FastF1
        if: steps.check.outputs.should-refresh == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v4
        with:
          path: ~/.fastf1_cache
          key: fastf1-${{ runner.os }}

      - name: Tests (unit only — skip Playwright E2E)
        if: steps.check.outputs.should-refresh == 'true' || github.event_name == 'workflow_dispatch'
        run: pytest projects/dashboard/tests -q -m "not e2e"

      - name: Run pipeline
        if: steps.check.outputs.should-refresh == 'true' || github.event_name == 'workflow_dispatch'
        run: python projects/dashboard/build_all.py

      - name: Commit and push if changed
        if: steps.check.outputs.should-refresh == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "chore(data): auto-refresh after GP (run #${{ github.run_number }})"
            git push
          else
            echo "Aucun changement à pousser."
          fi
